<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reafirma Spa - Conócenos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-wine: #632537;
            --dark-bg: #0e0e0f;
            --light-bg: #ffffff;
            --soft-gray: #f9f6f7;
            --text-dark: #2d2d2d;
            --text-light: #ffffff;
            --text-muted: #a6838d;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            color: var(--text-dark);
            background-color: var(--light-bg);
            line-height: 1.6;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            display: block;
            object-fit: cover;
        }

        /* --- HERO SECTION --- */
        .hero {
            background-color: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .hero-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            margin: 0 auto 15px;
            filter: invert(1);
        }

        .hero-title {
            font-family: var(--font-serif);
            color: var(--text-light);
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .hero-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            margin: auto;
        }

        .hero-image-container {
            width: 100%;
            max-width: 850px;
            height: 50vh;
            border-radius: 4px;
            overflow: hidden;
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-position: center 20%;
        }
